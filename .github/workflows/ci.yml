name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          environment-file: environment.yaml
          python-version: "3.10"
          activate-environment: rgb

      - name: Install spaCy model
        shell: bash -l {0}
        run: |
          python -m spacy download en_core_web_sm
          python -c "import spacy; spacy.load('en_core_web_sm'); print('spaCy model available')"

      - name: Lint
        shell: bash -l {0}
        run: ruff check .

      - name: Test
        shell: bash -l {0}
        run: pytest tests/ -q
